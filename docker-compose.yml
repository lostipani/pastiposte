version: '3.8'

services:

  server-sim:
    profiles: [ 'simulation' ]
    build:
      context: ./
      dockerfile: server/Dockerfile
    networks:
      - local-network
    ports:
      - "12345:12345"
    environment:
      WS_PORT: 12345
      LOG_LEVEL: "INFO"
      SLEEP: 1
    healthcheck:
      test: [ "CMD-SHELL", "curl http://localhost:12345/healthcheck" ]
      interval: 30s
      timeout: 30s
      start_period: 10s
      retries: 3

  listener-ws-sim:
    profiles: [ 'simulation' ]
    build:
      context: ./
      dockerfile: listener/Dockerfile
    networks:
      - local-network
    environment:
      URL: "ws://server-sim:12345/ws"
      SLEEP: 0
      BROKER_HOST: "rabbitmq"
      BROKER_EXCHANGE: "exchange"
      BROKER_EXCHANGE_TYPE: "direct"
      BROKER_ROUTING_KEY: "simulation"
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:
        condition: service_healthy
      server-sim:
        condition: service_healthy

  consumer-sim:
    profiles: [ 'simulation' ]
    build:
      context: ./
      dockerfile: consumer/Dockerfile
    networks:
      - local-network
    environment:
      SLEEP: 0
      BROKER_HOST: "rabbitmq"
      BROKER_EXCHANGE: "exchange"
      BROKER_EXCHANGE_TYPE: "direct"
      BROKER_ROUTING_KEY: "simulation"
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:
        condition: service_healthy
      server-sim:
        condition: service_healthy

  rabbitmq:
    profiles: [ 'real-world', 'simulation', 'spark-test' ]
    image: rabbitmq:4
    networks:
      - local-network
    ports:
      - "35672:5672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      start_period: 10s
      retries: 3

  listener-test:
    profiles: [ 'spark-test' ]
    build:
      context: ./
      dockerfile: listener/Dockerfile
    networks:
      - local-network
    environment:
      URL: "https://www.randomnumberapi.com/api/v1.0/randomstring?count=3"
      SLEEP: 10
      BROKER_HOST: "rabbitmq"
      BROKER_EXCHANGE: "exchange"
      BROKER_EXCHANGE_TYPE: "direct"
      BROKER_ROUTING_KEY: "httptest"
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer-test:
    profiles: [ 'spark-test' ]
    build:
      context: ./
      dockerfile: consumer/Dockerfile
    networks:
      - local-network
    environment:
      SLEEP: 0
      BROKER_HOST: "rabbitmq"
      BROKER_EXCHANGE: "exchange"
      BROKER_EXCHANGE_TYPE: "direct"
      BROKER_ROUTING_KEY: "httptest"
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:
        condition: service_healthy

  loader:
    profiles: [ 'spark-test' ]
    build:
      context: ./
      dockerfile: loader/Dockerfile
    networks:
      - local-network
    environment:
      SLEEP: 0
      BROKER_HOST: "rabbitmq"
      BROKER_EXCHANGE: "exchange"
      BROKER_EXCHANGE_TYPE: "direct"
      BROKER_ROUTING_KEY: "httptest"
      SPARK_MASTER: "spark://spark-master:7077"
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:
        condition: service_healthy
      spark-master:
        condition: service_healthy

  spark-master:
    profiles: [ 'spark-test' ]
    build:
      context: .
      dockerfile: transforming-loading/spark/Dockerfile
    entrypoint: [ './entrypoint.sh', 'master' ]
    networks:
      - local-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - spark-logs:/opt/spark/spark-events
    env_file:
      - transforming-loading/spark/env.spark
    ports:
      - '9090:8080'
      - '7077:7077'
  spark-worker:
    profiles: [ 'spark-test' ]
    build:
      context: .
      dockerfile: transforming-loading/spark/Dockerfile
    entrypoint: [ './entrypoint.sh', 'worker' ]
    networks:
      - local-network
    depends_on:
      - spark-master
    env_file:
      - transforming-loading/spark/env.spark
    volumes:
      - spark-logs:/opt/spark/spark-events

  listener-ws-1:
    profiles: [ 'real-world' ]
    build:
      context: ./
      dockerfile: listener/Dockerfile
    networks:
      - local-network
    environment:
      URL: "wss://stream.binance.com:9443/ws/btcusdc@trade"
      SLEEP: 0
      BROKER_HOST: "rabbitmq"
      BROKER_EXCHANGE: "exchange"
      BROKER_EXCHANGE_TYPE: "direct"
      BROKER_ROUTING_KEY: "trade"
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:
        condition: service_healthy

  listener-ws-2:
    profiles: [ 'real-world' ]
    build:
      context: ./
      dockerfile: listener/Dockerfile
    networks:
      - local-network
    environment:
      URL: "wss://stream.binance.com:9443/ws/bnbusdc@kline_1m"
      SLEEP: 0
      BROKER_HOST: "rabbitmq"
      BROKER_EXCHANGE: "exchange"
      BROKER_EXCHANGE_TYPE: "direct"
      BROKER_ROUTING_KEY: "kline_1m"
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:
        condition: service_healthy

  listener-http:
    profiles: [ 'real-world' ]
    build:
      context: ./
      dockerfile: listener/Dockerfile
    networks:
      - local-network
    environment:
      URL: "https://api.frankfurter.dev/v1/latest?base=USD"
      SLEEP: 10
      BROKER_HOST: "rabbitmq"
      BROKER_EXCHANGE: "exchange"
      BROKER_EXCHANGE_TYPE: "direct"
      BROKER_ROUTING_KEY: "frankfurter"
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer:
    profiles: [ 'real-world' ]
    build:
      context: ./
      dockerfile: consumer/Dockerfile
    networks:
      - local-network
    environment:
      SLEEP: 0
      BROKER_HOST: "rabbitmq"
      BROKER_EXCHANGE: "exchange"
      BROKER_EXCHANGE_TYPE: "direct"
      BROKER_ROUTING_KEY: "trade, kline_1m, frankfurter"
      LOG_LEVEL: "INFO"
    depends_on:
      rabbitmq:
        condition: service_healthy

networks:
  local-network:
    driver: bridge

volumes:
  spark-logs:
